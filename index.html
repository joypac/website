<!DOCTYPE html>
<html>
<head>
	<meta property="og:image" content="eu.png">
	<meta name="twitter:image" content="eu.png">
<title>O meu primeiro site</title>
<link href="https://fonts.googleapis.com/css?family=Roboto:400,700&display=swap" rel="stylesheet">
<style>
body {
	margin: 0;
	overflow: hidden;
	background: #fff;
	font-family: 'Roboto', Arial, sans-serif;
}
#dvd {
	position: absolute;
	width: auto;
	height: auto;
	/* border-radius: 50%; */
	overflow: visible;
}
#dvd img {
	width: 200%;
	height: 200%;
	object-fit: contain;
	display: block;
}
.footer {
    position: fixed;
    left: 0;
    bottom: 0;
    width: 100vw;
    text-align: center;
    background: transparent;
    color: #111;
    font-family: 'Roboto', Arial, sans-serif;
    font-size: 3.5rem;
    padding: 32px 0 24px 0;
    letter-spacing: 0.5px;
    z-index: 10;
}

@media (max-width: 600px) {
    .footer {
        font-size: 6vw;
        padding: 48px 0 32px 0;
    }
    #dvd img {
        width: 120vw;
        height: auto;
        max-height: 60vh;
    }
}
}
</style>
</head>

<body>

<div id="dvd">
	<img src="eu.png" alt="Minha cara" />
</div>
<div class="footer">hello@joaopacheco.pt</div>
<script>
	const dvd = document.getElementById('dvd');
const img = dvd.querySelector('img');
const speed = 2.5;
let x = 100, y = 100;
let dx = speed, dy = speed;
let angle = 0;

function animate() {
    const w = window.innerWidth;
    const h = window.innerHeight;
    const footer = document.querySelector('.footer');
    const footerHeight = footer ? footer.offsetHeight : 0;
    const sizeW = (img.naturalWidth || img.width) * 2;
    const sizeH = (img.naturalHeight || img.height) * 2;
    x += dx;
    y += dy;
    // Rebater nas margens (efeito DVD clássico), evitando o rodapé
    if (x <= 0) {
        x = 0;
        dx *= -1;
    } else if (x + sizeW >= w) {
        x = w - sizeW;
        dx *= -1;
    }
    if (y <= 0) {
        y = 0;
        dy *= -1;
    } else if (y + sizeH >= h - footerHeight) {
        y = h - footerHeight - sizeH;
        dy *= -1;
    }
    angle += 0.01 * speed;
    dvd.style.left = x + 'px';
    dvd.style.top = y + 'px';
    dvd.style.width = sizeW + 'px';
    dvd.style.height = sizeH + 'px';
    dvd.style.transform = `rotate(${angle}rad)`;
    requestAnimationFrame(animate);
}

if (img.complete) {
    animate();
} else {
    img.onload = animate;
}
</script> 
</html>
